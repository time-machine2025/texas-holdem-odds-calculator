<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Texas Hold'em Odds Calculator</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1eb;
      --surface: #fffdf8;
      --surface-2: #eee8dd;
      --ink: #1f2528;
      --muted: #68706f;
      --line: #d8d0c2;
      --green: #0d7a5f;
      --green-2: #dff3ec;
      --red: #b33a3a;
      --gold: #b7791f;
      --blue: #1f6095;
      --shadow: 0 18px 45px rgba(31, 37, 40, 0.12);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(13, 122, 95, 0.12), transparent 42%),
        linear-gradient(315deg, rgba(183, 121, 31, 0.14), transparent 35%),
        var(--bg);
      color: var(--ink);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 30px 0 42px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: end;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .table {
      position: relative;
      overflow: hidden;
      min-height: 208px;
      padding: 22px;
      border: 1px solid rgba(216, 208, 194, 0.8);
      border-radius: 8px;
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.16), transparent 62%),
        linear-gradient(145deg, #0b6d59, #07513f);
      box-shadow: var(--shadow);
      color: #fffdf8;
    }

    .table::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(255, 255, 255, 0.23);
      border-radius: 999px;
      pointer-events: none;
    }

    .table-inner {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
      align-items: center;
      min-height: 164px;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 800;
      color: rgba(255, 253, 248, 0.78);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .slots {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .slot {
      display: grid;
      place-items: center;
      width: 70px;
      aspect-ratio: 0.72;
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.12);
      color: rgba(255, 253, 248, 0.72);
      cursor: pointer;
      user-select: none;
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
    }

    .slot:hover,
    .slot.active {
      transform: translateY(-2px);
      border-color: #fffdf8;
      background: rgba(255, 253, 248, 0.2);
    }

    .slot.filled {
      border-color: #fffdf8;
      background: #fffdf8;
      color: var(--ink);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
    }

    .slot .rank {
      font-size: 27px;
      line-height: 1;
      font-weight: 850;
    }

    .slot .suit {
      margin-top: 4px;
      font-size: 25px;
      line-height: 1;
    }

    .slot.red {
      color: var(--red);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 380px) 1fr;
      gap: 18px;
      margin-top: 18px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.92);
      box-shadow: 0 10px 28px rgba(31, 37, 40, 0.08);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px 0;
    }

    .panel h2 {
      margin: 0;
      font-size: 17px;
      letter-spacing: 0;
    }

    .panel-body {
      padding: 16px 18px 18px;
    }

    .control-row {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    label {
      font-weight: 750;
      font-size: 14px;
    }

    .range-line {
      display: grid;
      grid-template-columns: 1fr 44px;
      gap: 12px;
      align-items: center;
    }

    input[type="range"] {
      accent-color: var(--green);
      width: 100%;
    }

    .number-pill {
      display: grid;
      place-items: center;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      font-weight: 850;
    }

    select {
      width: 100%;
      min-height: 40px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .btn {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font-weight: 750;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: #b8aa98;
      background: #fbf5ec;
    }

    .btn.primary {
      border-color: #07513f;
      background: #0d7a5f;
      color: #fffdf8;
    }

    .stats {
      display: grid;
      gap: 12px;
    }

    .stat-main {
      display: grid;
      gap: 10px;
      padding: 16px;
      border-radius: 8px;
      background: var(--green-2);
      border: 1px solid rgba(13, 122, 95, 0.22);
    }

    .stat-value {
      font-size: clamp(38px, 6vw, 64px);
      line-height: 0.95;
      font-weight: 900;
      color: var(--green);
      letter-spacing: 0;
    }

    .meter {
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(13, 122, 95, 0.16);
    }

    .meter > span {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #0d7a5f, #66aa72);
      transition: width 180ms ease;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .mini-stat {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    .mini-stat b {
      display: block;
      margin-bottom: 4px;
      font-size: 20px;
    }

    .mini-stat span,
    .note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .picker-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .mode {
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--ink);
      font-weight: 750;
      cursor: pointer;
    }

    .mode.active {
      border-color: #0d7a5f;
      background: var(--green-2);
      color: #07513f;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(13, minmax(42px, 1fr));
      gap: 8px;
    }

    .card-btn {
      display: grid;
      place-items: center;
      min-width: 0;
      aspect-ratio: 0.72;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      cursor: pointer;
      transition: transform 110ms ease, box-shadow 110ms ease, border-color 110ms ease;
    }

    .card-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      border-color: #a99882;
      box-shadow: 0 8px 18px rgba(31, 37, 40, 0.12);
    }

    .card-btn:disabled {
      cursor: not-allowed;
      opacity: 0.38;
      background: var(--surface-2);
    }

    .card-btn .rank {
      font-size: 18px;
      line-height: 1;
      font-weight: 850;
    }

    .card-btn .suit {
      margin-top: 3px;
      font-size: 18px;
      line-height: 1;
    }

    .red {
      color: var(--red);
    }

    .status-line {
      min-height: 20px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 920px) {
      header,
      .layout,
      .table-inner {
        grid-template-columns: 1fr;
      }

      .table {
        min-height: 0;
      }

      .card-grid {
        grid-template-columns: repeat(8, minmax(38px, 1fr));
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100vw - 20px, 1180px);
        padding-top: 16px;
      }

      .table {
        padding: 16px;
      }

      .table::before {
        inset: 10px;
      }

      .slot {
        width: 56px;
      }

      .slot .rank {
        font-size: 22px;
      }

      .slot .suit {
        font-size: 20px;
      }

      .card-grid {
        grid-template-columns: repeat(6, minmax(38px, 1fr));
        gap: 7px;
      }

      .stat-grid,
      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <h1>Texas Hold'em Odds Calculator</h1>
        <p class="subtitle">选择总玩家数，录入你的两张手牌，并随着翻牌、转牌、河牌更新公牌。胜率会自动重新计算。</p>
      </div>
    </header>

    <section class="table" aria-label="牌桌">
      <div class="table-inner">
        <div>
          <p class="section-title">我的手牌</p>
          <div class="slots" id="heroSlots"></div>
        </div>
        <div>
          <p class="section-title">公牌</p>
          <div class="slots" id="boardSlots"></div>
        </div>
      </div>
    </section>

    <div class="layout">
      <aside class="panel">
        <div class="panel-head">
          <h2>牌局设置</h2>
        </div>
        <div class="panel-body">
          <div class="control-row">
            <label for="players">玩家总数</label>
            <div class="range-line">
              <input id="players" type="range" min="2" max="10" value="6">
              <div class="number-pill" id="playerCount">6</div>
            </div>
          </div>

          <div class="control-row">
            <label for="accuracy">计算精度</label>
            <select id="accuracy">
              <option value="2500">快速 · 2,500 次模拟</option>
              <option value="8000" selected>均衡 · 8,000 次模拟</option>
              <option value="25000">细致 · 25,000 次模拟</option>
            </select>
          </div>

          <div class="actions">
            <button class="btn primary" id="randomHero" type="button">随机手牌</button>
            <button class="btn" id="clearBoard" type="button">清空公牌</button>
            <button class="btn" id="randomBoard" type="button">随机公牌</button>
            <button class="btn" id="clearAll" type="button">全部清空</button>
          </div>
        </div>
      </aside>

      <section class="panel">
        <div class="panel-head">
          <h2>实时胜率</h2>
          <span class="note" id="runState">等待输入手牌</span>
        </div>
        <div class="panel-body">
          <div class="stats">
            <div class="stat-main">
              <span class="note">当前胜率</span>
              <div class="stat-value" id="winRate">--</div>
              <div class="meter" aria-hidden="true"><span id="winMeter"></span></div>
            </div>
            <div class="stat-grid">
              <div class="mini-stat">
                <b id="tieRate">--</b>
                <span>平局概率</span>
              </div>
              <div class="mini-stat">
                <b id="loseRate">--</b>
                <span>失败概率</span>
              </div>
              <div class="mini-stat">
                <b id="equityRate">--</b>
                <span>摊牌权益</span>
              </div>
            </div>
            <div class="note" id="detailText">请先录入两张初始手牌。</div>
          </div>
        </div>
      </section>

      <section class="panel" style="grid-column: 1 / -1;">
        <div class="panel-head">
          <h2>选牌</h2>
        </div>
        <div class="panel-body">
          <div class="picker-tools" role="tablist" aria-label="选择录入位置">
            <button class="mode active" id="modeHero" type="button">录入手牌</button>
            <button class="mode" id="modeBoard" type="button">更新公牌</button>
          </div>
          <div class="card-grid" id="cardGrid"></div>
          <div class="status-line" id="pickerHint">正在录入手牌，点击空位或直接点牌。</div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const ranks = [
      { v: 14, label: "A" },
      { v: 13, label: "K" },
      { v: 12, label: "Q" },
      { v: 11, label: "J" },
      { v: 10, label: "T" },
      { v: 9, label: "9" },
      { v: 8, label: "8" },
      { v: 7, label: "7" },
      { v: 6, label: "6" },
      { v: 5, label: "5" },
      { v: 4, label: "4" },
      { v: 3, label: "3" },
      { v: 2, label: "2" }
    ];
    const suits = [
      { key: "s", label: "♠", name: "黑桃", red: false },
      { key: "h", label: "♥", name: "红桃", red: true },
      { key: "d", label: "♦", name: "方块", red: true },
      { key: "c", label: "♣", name: "梅花", red: false }
    ];

    const deck = suits.flatMap(suit => ranks.map(rank => ({
      id: `${rank.label}${suit.key}`,
      rank: rank.v,
      rankLabel: rank.label,
      suit: suit.key,
      suitLabel: suit.label,
      suitName: suit.name,
      red: suit.red
    })));

    const state = {
      hero: [null, null],
      board: [null, null, null, null, null],
      mode: "hero",
      active: { area: "hero", index: 0 },
      calcToken: 0
    };

    const byId = new Map(deck.map(card => [card.id, card]));
    const $ = selector => document.querySelector(selector);

    const heroSlots = $("#heroSlots");
    const boardSlots = $("#boardSlots");
    const cardGrid = $("#cardGrid");
    const players = $("#players");
    const playerCount = $("#playerCount");
    const accuracy = $("#accuracy");
    const runState = $("#runState");
    const winRate = $("#winRate");
    const tieRate = $("#tieRate");
    const loseRate = $("#loseRate");
    const equityRate = $("#equityRate");
    const winMeter = $("#winMeter");
    const detailText = $("#detailText");
    const pickerHint = $("#pickerHint");
    const modeHero = $("#modeHero");
    const modeBoard = $("#modeBoard");

    function formatPercent(value) {
      if (!Number.isFinite(value)) return "--";
      const digits = value >= 10 ? 1 : 2;
      return `${value.toFixed(digits)}%`;
    }

    function selectedIds() {
      return new Set([...state.hero, ...state.board].filter(Boolean));
    }

    function firstEmpty(area) {
      return state[area].findIndex(card => !card);
    }

    function setMode(mode) {
      state.mode = mode;
      modeHero.classList.toggle("active", mode === "hero");
      modeBoard.classList.toggle("active", mode === "board");
      const empty = firstEmpty(mode);
      state.active = { area: mode, index: empty === -1 ? 0 : empty };
      pickerHint.textContent = mode === "hero"
        ? "正在录入手牌，点击空位或直接点牌。"
        : "正在更新公牌，点击公牌空位或直接点牌。";
      renderSlots();
    }

    function renderCardFace(container, cardId, small = false) {
      const card = byId.get(cardId);
      if (!card) {
        container.textContent = "+";
        return;
      }
      container.classList.toggle("red", card.red);
      container.innerHTML = `<span class="rank">${card.rankLabel}</span><span class="suit">${card.suitLabel}</span>`;
      container.setAttribute("aria-label", `${card.suitName}${card.rankLabel}`);
    }

    function renderSlots() {
      heroSlots.innerHTML = "";
      state.hero.forEach((cardId, index) => {
        const slot = document.createElement("button");
        slot.type = "button";
        slot.className = "slot";
        if (cardId) slot.classList.add("filled");
        if (state.active.area === "hero" && state.active.index === index) slot.classList.add("active");
        renderCardFace(slot, cardId);
        slot.addEventListener("click", () => {
          if (cardId) {
            state.hero[index] = null;
            state.active = { area: "hero", index };
            setMode("hero");
            renderAll();
            scheduleCalculation();
            return;
          }
          state.active = { area: "hero", index };
          setMode("hero");
        });
        heroSlots.appendChild(slot);
      });

      boardSlots.innerHTML = "";
      state.board.forEach((cardId, index) => {
        const slot = document.createElement("button");
        slot.type = "button";
        slot.className = "slot";
        if (cardId) slot.classList.add("filled");
        if (state.active.area === "board" && state.active.index === index) slot.classList.add("active");
        renderCardFace(slot, cardId);
        slot.addEventListener("click", () => {
          if (cardId) {
            state.board[index] = null;
            state.active = { area: "board", index };
            setMode("board");
            renderAll();
            scheduleCalculation();
            return;
          }
          state.active = { area: "board", index };
          setMode("board");
        });
        boardSlots.appendChild(slot);
      });
    }

    function renderGrid() {
      const used = selectedIds();
      cardGrid.innerHTML = "";
      for (const suit of suits) {
        for (const rank of ranks) {
          const card = deck.find(item => item.suit === suit.key && item.rank === rank.v);
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "card-btn";
          btn.disabled = used.has(card.id);
          btn.classList.toggle("red", card.red);
          btn.innerHTML = `<span class="rank">${card.rankLabel}</span><span class="suit">${card.suitLabel}</span>`;
          btn.title = `${card.suitName}${card.rankLabel}`;
          btn.addEventListener("click", () => chooseCard(card.id));
          cardGrid.appendChild(btn);
        }
      }
    }

    function renderAll() {
      playerCount.textContent = players.value;
      renderSlots();
      renderGrid();
    }

    function chooseCard(cardId) {
      const area = state.active.area || state.mode;
      let index = state.active.index;
      if (state[area][index]) {
        index = firstEmpty(area);
      }
      if (index === -1) {
        state[area][state[area].length - 1] = cardId;
      } else {
        state[area][index] = cardId;
      }

      const next = firstEmpty(area);
      if (next === -1 && area === "hero" && firstEmpty("board") !== -1) {
        state.active = { area: "board", index: firstEmpty("board") };
        setMode("board");
      } else {
        state.active = { area, index: next === -1 ? index : next };
      }
      renderAll();
      scheduleCalculation();
    }

    function shuffledPool(excludedIds) {
      return deck.filter(card => !excludedIds.has(card.id));
    }

    function sampleCards(pool, count) {
      const copy = pool.slice();
      const picked = [];
      for (let i = 0; i < count; i += 1) {
        const j = i + Math.floor(Math.random() * (copy.length - i));
        [copy[i], copy[j]] = [copy[j], copy[i]];
        picked.push(copy[i]);
      }
      return picked;
    }

    function clearRates(message) {
      winRate.textContent = "--";
      tieRate.textContent = "--";
      loseRate.textContent = "--";
      equityRate.textContent = "--";
      winMeter.style.width = "0%";
      runState.textContent = "等待输入手牌";
      detailText.textContent = message;
    }

    function scheduleCalculation() {
      state.calcToken += 1;
      const token = state.calcToken;
      const hero = state.hero.filter(Boolean).map(id => byId.get(id));
      const board = state.board.filter(Boolean).map(id => byId.get(id));
      const totalPlayers = Number(players.value);
      const iterations = Number(accuracy.value);

      if (hero.length < 2) {
        clearRates("请先录入两张初始手牌。");
        return;
      }
      if (board.length > 5) {
        clearRates("公牌最多五张。");
        return;
      }

      const excluded = selectedIds();
      const pool = shuffledPool(excluded);
      const neededBoard = 5 - board.length;
      const neededCards = neededBoard + (totalPlayers - 1) * 2;
      if (pool.length < neededCards) {
        clearRates("剩余牌数不足，请检查输入。");
        return;
      }

      runState.textContent = "计算中";
      detailText.textContent = `正在模拟 ${iterations.toLocaleString("zh-CN")} 次随机发牌...`;
      setTimeout(() => runSimulation({ token, hero, board, totalPlayers, iterations, pool, neededBoard }), 20);
    }

    function runSimulation({ token, hero, board, totalPlayers, iterations, pool, neededBoard }) {
      let wins = 0;
      let ties = 0;
      let losses = 0;
      let equity = 0;
      let done = 0;
      const chunk = 500;

      function step() {
        if (token !== state.calcToken) return;
        const limit = Math.min(iterations, done + chunk);
        for (; done < limit; done += 1) {
          const drawCount = neededBoard + (totalPlayers - 1) * 2;
          const drawn = sampleCards(pool, drawCount);
          const finalBoard = board.concat(drawn.slice(0, neededBoard));
          let cursor = neededBoard;
          const heroScore = bestSeven(hero.concat(finalBoard));
          let bestOpp = -1;
          let oppTies = 0;

          for (let p = 1; p < totalPlayers; p += 1) {
            const opp = [drawn[cursor], drawn[cursor + 1]];
            cursor += 2;
            const score = bestSeven(opp.concat(finalBoard));
            if (score > bestOpp) {
              bestOpp = score;
              oppTies = 1;
            } else if (score === bestOpp) {
              oppTies += 1;
            }
          }

          if (heroScore > bestOpp) {
            wins += 1;
            equity += 1;
          } else if (heroScore === bestOpp) {
            ties += 1;
            equity += 1 / (oppTies + 1);
          } else {
            losses += 1;
          }
        }

        const winPct = wins / done * 100;
        const tiePct = ties / done * 100;
        const losePct = losses / done * 100;
        const equityPct = equity / done * 100;
        updateRates(winPct, tiePct, losePct, equityPct, done, iterations);

        if (done < iterations) {
          requestAnimationFrame(step);
        } else {
          runState.textContent = "已更新";
          detailText.textContent = `基于 ${iterations.toLocaleString("zh-CN")} 次蒙特卡洛模拟；玩家越多或公牌越少，结果会有轻微波动。`;
        }
      }

      step();
    }

    function updateRates(winPct, tiePct, losePct, equityPct, done, total) {
      winRate.textContent = formatPercent(winPct);
      tieRate.textContent = formatPercent(tiePct);
      loseRate.textContent = formatPercent(losePct);
      equityRate.textContent = formatPercent(equityPct);
      winMeter.style.width = `${Math.max(0, Math.min(100, winPct))}%`;
      runState.textContent = done < total ? `${Math.round(done / total * 100)}%` : "已更新";
    }

    function bestSeven(cards) {
      let best = 0;
      for (let a = 0; a < cards.length - 4; a += 1) {
        for (let b = a + 1; b < cards.length - 3; b += 1) {
          for (let c = b + 1; c < cards.length - 2; c += 1) {
            for (let d = c + 1; d < cards.length - 1; d += 1) {
              for (let e = d + 1; e < cards.length; e += 1) {
                const score = scoreFive([cards[a], cards[b], cards[c], cards[d], cards[e]]);
                if (score > best) best = score;
              }
            }
          }
        }
      }
      return best;
    }

    function scoreFive(cards) {
      const rankCounts = new Map();
      for (const card of cards) {
        rankCounts.set(card.rank, (rankCounts.get(card.rank) || 0) + 1);
      }
      const ranksDesc = [...rankCounts.keys()].sort((a, b) => b - a);
      const flush = cards.every(card => card.suit === cards[0].suit);
      const straightHigh = getStraightHigh(ranksDesc);
      const groups = [...rankCounts.entries()]
        .map(([rank, count]) => ({ rank, count }))
        .sort((a, b) => b.count - a.count || b.rank - a.rank);

      if (flush && straightHigh) return encodeScore(8, [straightHigh]);
      if (groups[0].count === 4) {
        const kicker = groups.find(group => group.count === 1).rank;
        return encodeScore(7, [groups[0].rank, kicker]);
      }
      if (groups[0].count === 3 && groups[1].count === 2) {
        return encodeScore(6, [groups[0].rank, groups[1].rank]);
      }
      if (flush) return encodeScore(5, ranksDesc);
      if (straightHigh) return encodeScore(4, [straightHigh]);
      if (groups[0].count === 3) {
        const kickers = groups.filter(group => group.count === 1).map(group => group.rank).sort((a, b) => b - a);
        return encodeScore(3, [groups[0].rank, ...kickers]);
      }
      if (groups[0].count === 2 && groups[1].count === 2) {
        const pairRanks = groups.filter(group => group.count === 2).map(group => group.rank).sort((a, b) => b - a);
        const kicker = groups.find(group => group.count === 1).rank;
        return encodeScore(2, [...pairRanks, kicker]);
      }
      if (groups[0].count === 2) {
        const kickers = groups.filter(group => group.count === 1).map(group => group.rank).sort((a, b) => b - a);
        return encodeScore(1, [groups[0].rank, ...kickers]);
      }
      return encodeScore(0, ranksDesc);
    }

    function getStraightHigh(uniqueRanksDesc) {
      const ranksAsc = [...uniqueRanksDesc].sort((a, b) => a - b);
      if (ranksAsc.includes(14)) ranksAsc.unshift(1);
      let run = 1;
      let best = 0;
      for (let i = 1; i < ranksAsc.length; i += 1) {
        if (ranksAsc[i] === ranksAsc[i - 1] + 1) {
          run += 1;
          if (run >= 5) best = ranksAsc[i] === 1 ? 5 : ranksAsc[i];
        } else if (ranksAsc[i] !== ranksAsc[i - 1]) {
          run = 1;
        }
      }
      return best;
    }

    function encodeScore(category, kickers) {
      let score = category;
      const filled = kickers.concat([0, 0, 0, 0, 0]).slice(0, 5);
      for (const value of filled) {
        score = score * 15 + value;
      }
      return score;
    }

    function randomFill(area, count) {
      const used = selectedIds();
      for (let i = 0; i < state[area].length; i += 1) {
        state[area][i] = null;
      }
      const pool = sampleCards(shuffledPool(used), count);
      pool.forEach((card, index) => {
        state[area][index] = card.id;
      });
      state.active = { area, index: Math.min(count, state[area].length - 1) };
      setMode(area);
      renderAll();
      scheduleCalculation();
    }

    modeHero.addEventListener("click", () => setMode("hero"));
    modeBoard.addEventListener("click", () => setMode("board"));
    players.addEventListener("input", () => {
      playerCount.textContent = players.value;
      scheduleCalculation();
    });
    accuracy.addEventListener("change", scheduleCalculation);
    $("#clearBoard").addEventListener("click", () => {
      state.board = [null, null, null, null, null];
      state.active = { area: "board", index: 0 };
      setMode("board");
      renderAll();
      scheduleCalculation();
    });
    $("#clearAll").addEventListener("click", () => {
      state.hero = [null, null];
      state.board = [null, null, null, null, null];
      state.active = { area: "hero", index: 0 };
      setMode("hero");
      renderAll();
      scheduleCalculation();
    });
    $("#randomHero").addEventListener("click", () => randomFill("hero", 2));
    $("#randomBoard").addEventListener("click", () => {
      const boardCards = 3 + Math.floor(Math.random() * 3);
      randomFill("board", boardCards);
    });

    renderAll();
    scheduleCalculation();
  </script>
</body>
</html>
